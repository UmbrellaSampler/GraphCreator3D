name: Task
description: Implementable work item under one epic
title: "[Task][P1] "
labels:
  - "kind:task"
  - "phase:P1"
body:
  - type: input
    id: parent_epic
    attributes:
      label: Parent epic issue
      description: Provide epic reference like #12.
      placeholder: "#<epic-issue-number>"
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - "P1 Data Model and Format"
        - "P2 Editor Core"
        - "P3 Terrain Authoring"
        - "P4 Multimodal and Validation"
        - "P5 UX and Query API"
        - "P6 Quality Demo Release"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Keep tasks around 0.5-2 days where possible.
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Clear and testable implementation goal.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] AC1 ...
        - [ ] AC2 ...
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes
      description: Constraints, sequencing, and technical notes.
    validations:
      required: false

  - type: textarea
    id: subtask_plan
    attributes:
      label: Sub-task plan
      description: Use sub-issues for independently tracked sub-work.
      placeholder: |
        - [ ] Sub-task A
        - [ ] Sub-task B
    validations:
      required: false
